environment: DEV
agent_2:
  # PostgreSQL logging schema and table for ETL job execution history
  pg_schema_etl_log: a_etl_monitor
  pg_table_job_log: etl_job_log
  
  # Maximum errors to process per polling cycle
  max_errors_per_run: 50
  
  # Lookback window in minutes — retrieve errors from last N minutes
  # Rule: lookback_minutes >= POLL_INTERVAL_seconds / 60 * 2
  # If poll_interval=60s -> min 2 min, recommend 5 min for safety
  # Set -1 to disable time filter (manual backfill mode only)
  lookback_minutes: 5
  
  # Agent logging schema (for deduplication and audit trail)
  pg_schema_agent_log: agent_log

  retry:
    enabled: true
    max_retries: 3
    confirmed_new_failure_minutes: 2
    fallback_delay_minutes: 5
    max_retry_window_minutes: 50
    nifi_luong3_processor_id: "REPLACE_WITH_ACTUAL_PROCESSOR_ID"
